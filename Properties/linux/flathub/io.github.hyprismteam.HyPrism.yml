app-id: io.github.hyprismteam.HyPrism
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: hyprism-launcher-wrapper.sh

sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10
  - org.freedesktop.Sdk.Extension.node22

build-options:
  prepend-path: "/usr/lib/sdk/dotnet10/bin"
  append-path: /usr/lib/sdk/node22/bin
  append-ld-library-path: "/usr/lib/sdk/dotnet10/lib"
  env:
    PKG_CONFIG_PATH: "/app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig:/usr/lib/sdk/dotnet10/lib/pkgconfig"
    DOTNET_ROOT: "/usr/lib/sdk/dotnet10"

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --device=input
  - --env=LD_LIBRARY_PATH=/app/lib
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto
modules:

  - name: HyPrism-node
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/HyPrism/flatpak-node/cache
        npm_config_cache: /run/build/HyPrism/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node22
        npm_config_offline: 'true'
    subdir: Frontend
    build-commands:
      - npm install --offline
    sources:
      - type: git
        url:  https://github.com/hyprismteam/HyPrism
        branch: HYPRISM_MAIN_BRANCH
      - generated-sources.json

  - name: dotnet
    buildsystem: simple
    build-commands:
    - /usr/lib/sdk/dotnet10/bin/install.sh

  - name: HyPrism-dotnet
    buildsystem: simple
    
    build-commands:
      # - Scripts/publish.sh flatpak --arch x64 --sources ./nuget-sources
      - dotnet build --source ./nuget-sources
      #- dotnet publish HyPrism.csproj /p:FullRelease=True -c Release --no-self-contained --source ./nuget-sources
      #- dotnet publish HyPrism.csproj -c Release --no-self-contained --source ./nuget-sources
      - mkdir -p ${FLATPAK_DEST}/bin
      - cp -r bin/Release/net10.0/publish/* ${FLATPAK_DEST}/bin
      - install -Dm755 Properties/linux/flatpak/hyprism-launcher-wrapper.sh /app/bin/hyprism-launcher-wrapper.sh
      - install -Dm644 Frontend/src/assets/images/appicon_512.png /app/share/icons/hicolor/256x256/apps/io.github.hyprismteam.HyPrism.png
      - install -Dm644 Properties/linux/io.github.hyprismteam.HyPrism.desktop /app/share/applications/io.github.hyprismteam.HyPrism.desktop
      - install -Dm644 Properties/linux/io.github.hyprismteam.HyPrism.metainfo.xml /app/share/metainfo/io.github.hyprismteam.HyPrism.metainfo.xml
    sources:
      - type: git
        url:  https://github.com/hyprismteam/HyPrism
        branch: HYPRISM_MAIN_BRANCH
      - nuget-sources.json
